<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ledger — Budgeting</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Canvas */
    --bg: oklch(98% 0.004 80);
    --bg-2: oklch(96% 0.006 80);
    --ink: oklch(18% 0.012 260);
    --ink-2: oklch(28% 0.015 260);
    --ink-soft: oklch(45% 0.012 260);
    --ink-mute: oklch(62% 0.01 260);
    --line: oklch(92% 0.006 260);
    --line-strong: oklch(86% 0.008 260);

    /* Accent */
    --accent: oklch(78% 0.16 165);
    --accent-ink: oklch(30% 0.08 165);
    --accent-soft: oklch(94% 0.05 165);

    --danger: oklch(65% 0.18 25);
    --danger-soft: oklch(95% 0.04 25);
    --warn: oklch(78% 0.12 75);

    /* Glass */
    --glass-bg: color-mix(in oklab, white 70%, transparent);
    --glass-border: color-mix(in oklab, white 60%, transparent);
    --glass-blur: 18px;

    /* Radius */
    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 18px;
    --r-xl: 24px;

    /* Shadow */
    --shadow-sm: 0 1px 2px rgba(15, 20, 35, 0.04), 0 1px 1px rgba(15, 20, 35, 0.02);
    --shadow-md: 0 6px 20px -8px rgba(15, 20, 35, 0.12), 0 2px 6px -2px rgba(15, 20, 35, 0.06);
    --shadow-lg: 0 24px 48px -24px rgba(15, 20, 35, 0.18), 0 8px 16px -8px rgba(15, 20, 35, 0.08);

    --sans: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
    --mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-size: 14px;
    line-height: 1.45;
    overflow: hidden;
  }

  /* Ambient aurora backdrop */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(900px 600px at 88% -10%, oklch(85% 0.12 165 / 0.35), transparent 60%),
      radial-gradient(700px 500px at 105% 45%, oklch(80% 0.12 300 / 0.20), transparent 60%),
      radial-gradient(600px 400px at -10% 90%, oklch(85% 0.08 220 / 0.18), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(to right, oklch(50% 0.01 260 / 0.035) 1px, transparent 1px),
      linear-gradient(to bottom, oklch(50% 0.01 260 / 0.035) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse at 50% 40%, black 30%, transparent 80%);
  }

  #root { position: relative; z-index: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: oklch(50% 0.01 260 / 0.18); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: oklch(50% 0.01 260 / 0.32); background-clip: padding-box; border: 2px solid transparent; }

  .mono { font-family: var(--mono); font-feature-settings: "ss01", "tnum"; font-variant-numeric: tabular-nums; }
  .tnum { font-variant-numeric: tabular-nums; }

  /* Glass card */
  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(var(--glass-blur)) saturate(140%);
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
    border: 1px solid var(--glass-border);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.6);
  }

  .hairline { border: 1px solid var(--line); border-radius: var(--r-lg); }

  /* Buttons */
  button { font-family: inherit; cursor: pointer; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid transparent;
    transition: background .15s, border-color .15s, color .15s, transform .05s;
    white-space: nowrap;
  }
  .btn:active { transform: translateY(0.5px); }
  .btn-primary {
    background: var(--accent);
    color: oklch(18% 0.03 165);
    border-color: color-mix(in oklab, var(--accent), black 15%);
    box-shadow: 0 1px 0 inset oklch(100% 0 0 / 0.4), 0 2px 6px -2px oklch(50% 0.16 165 / 0.4);
  }
  .btn-primary:hover { background: color-mix(in oklab, var(--accent), black 4%); }
  .btn-ghost {
    background: color-mix(in oklab, white 40%, transparent);
    color: var(--ink);
    border-color: var(--line-strong);
  }
  .btn-ghost:hover { background: color-mix(in oklab, white 70%, transparent); }
  .btn-dark {
    background: oklch(25% 0.015 260);
    color: white;
    border-color: oklch(35% 0.015 260);
  }
  .btn-dark:hover { background: oklch(28% 0.015 260); }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    background: color-mix(in oklab, white 50%, transparent);
    border: 1px solid var(--line);
    color: var(--ink-soft);
  }
  .chip-accent { background: var(--accent-soft); border-color: color-mix(in oklab, var(--accent), transparent 60%); color: var(--accent-ink); }
  .chip-danger { background: var(--danger-soft); border-color: color-mix(in oklab, var(--danger), transparent 60%); color: var(--danger); }
  .chip-dark { background: oklch(22% 0.015 260); border-color: oklch(30% 0.015 260); color: oklch(92% 0.01 260); }

  /* Focus ring */
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid color-mix(in oklab, var(--accent), transparent 40%);
    outline-offset: 2px;
  }

  /* Input */
  .input {
    background: color-mix(in oklab, white 60%, transparent);
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    padding: 7px 11px;
    font-size: 13px;
    color: var(--ink);
    transition: border-color .15s, background .15s;
  }
  .input:hover { background: color-mix(in oklab, white 80%, transparent); }
  .input:focus { outline: none; border-color: color-mix(in oklab, var(--accent), black 10%); background: white; }

  /* Sidebar nav item */
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background .12s, color .12s, border-color .12s;
  }
  .nav-item:hover { color: var(--ink); background: color-mix(in oklab, white 50%, transparent); }
  .nav-item.active {
    background: color-mix(in oklab, white 80%, transparent);
    color: var(--ink);
    border-color: var(--line);
    box-shadow: var(--shadow-sm), inset 0 1px 0 white;
  }
  .nav-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent), transparent 75%); opacity: 0; transition: opacity .12s; }
  .nav-item.active .dot { opacity: 1; }

  /* Section heading */
  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-mute);
    font-weight: 600;
  }

  /* Table */
  table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data thead th {
    text-align: left;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-mute);
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    background: color-mix(in oklab, white 40%, transparent);
  }
  table.data tbody td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }
  table.data tbody tr:last-child td { border-bottom: none; }
  table.data tbody tr:hover { background: color-mix(in oklab, white 40%, transparent); }

  /* Loading shimmer — unused but available */
  .sheen {
    background-image: linear-gradient(90deg, transparent 40%, oklch(100% 0 0 / 0.3) 50%, transparent 60%);
    background-size: 200% 100%;
    animation: sheen 1.6s infinite;
  }
  @keyframes sheen { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* Hero band pattern */
  .hero-pattern {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(135deg, oklch(100% 0 0 / 0.06) 0 1px, transparent 1px 12px),
      linear-gradient(45deg, oklch(100% 0 0 / 0.04) 0 1px, transparent 1px 14px);
    opacity: 0.6;
    mask-image: radial-gradient(ellipse at 85% 50%, black 0%, transparent 70%);
    pointer-events: none;
  }

  /* Bars */
  .bar-track { height: 6px; border-radius: 999px; background: color-mix(in oklab, var(--ink), transparent 92%); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: inherit; background: var(--accent); }
  .bar-fill.danger { background: var(--danger); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<script type="text/babel" src="src/charts.jsx"></script>

</body>
</html>
